<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health History — MediScan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages/health-history.css" />
</head>

<body>

  <header>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
      <div class="navbar__inner">
        <a href="../index.html" class="navbar__logo" aria-label="MediScan home">
          <img src="../assets/logo.svg" alt="MediScan" class="navbar__logo-img" />
        </a>
        <ul class="navbar__nav" role="list">
          <li><a href="health-history.html" class="active">Health History</a></li>
          <li><a href="specialists.html">Find Specialists</a></li>
          <li><a href="symptoms.html">AI Health Check</a></li>
        </ul>
        <div id="navbar__user-slot"></div>
      </div>
    </nav>
  </header>

  <main class="history-page">
    <div class="container">

      <!-- Page Header -->
      <div class="history-header">
        <div>
          <h1 class="history-header__title">Health History</h1>
          <p class="history-header__subtitle">Your complete health record and activity timeline</p>
        </div>
        <div class="history-header__actions">
          <a href="upload.html" class="btn btn-primary btn-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Upload Report
          </a>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="history-stats" id="historyStats">
        <div class="stat-card card">
          <div class="stat-card__icon stat-card__icon--primary" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
            </svg>
          </div>
          <div>
            <p class="stat-card__value" id="totalScans">0</p>
            <p class="stat-card__label">Total Scans</p>
          </div>
        </div>
        <div class="stat-card card">
          <div class="stat-card__icon stat-card__icon--success" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
          </div>
          <div>
            <p class="stat-card__value" id="totalAppointments">0</p>
            <p class="stat-card__label">Appointments</p>
          </div>
        </div>
        <div class="stat-card card">
          <div class="stat-card__icon stat-card__icon--warning" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
            </svg>
          </div>
          <div>
            <p class="stat-card__value" id="totalChecks">0</p>
            <p class="stat-card__label">Health Checks</p>
          </div>
        </div>
      </div>

      <!-- Timeline -->
      <section class="history-section">
        <h2 class="history-section__title">Activity Timeline</h2>
        <div class="timeline" id="timeline">
          <!-- Rendered by JS -->
        </div>
      </section>

    </div>
  </main>

  <script src="../config.js"></script>
  <script src="../js/nav.js" type="module"></script>
  <script type="module">
    import { loadData, formatDate, MOCK_HEALTH_HISTORY } from '../js/utils.js';

    const history = loadData('healthHistory') || MOCK_HEALTH_HISTORY;

    // Stats
    const scans = history.filter(h => h.type === 'scan').length;
    const appointments = history.filter(h => h.type === 'appointment').length;
    const checks = history.filter(h => h.type === 'check').length;

    document.getElementById('totalScans').textContent = scans;
    document.getElementById('totalAppointments').textContent = appointments;
    document.getElementById('totalChecks').textContent = checks;

    // Timeline
    const timeline = document.getElementById('timeline');

    if (history.length === 0) {
      timeline.innerHTML = `
        <div class="timeline__empty">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 16v-4"/>
            <path d="M12 8h.01"/>
          </svg>
          <p>No health activity yet.</p>
          <a href="upload.html" class="btn btn-primary btn-sm" style="margin-top:0.75rem">Upload Your First Report</a>
        </div>
      `;
    } else {
      timeline.innerHTML = history.map(item => {
        const iconMap = {
          'scan': `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
          'appointment': `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
          'check': `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>`,
        };
        const colorMap = {
          'scan': 'primary',
          'appointment': 'success',
          'check': 'warning',
        };
        const color = colorMap[item.type] || 'primary';

        return `
          <div class="timeline-item">
            <div class="timeline-item__dot timeline-item__dot--${color}">
              ${iconMap[item.type] || ''}
            </div>
            <div class="timeline-item__content card">
              <div class="timeline-item__header">
                <span class="badge badge-${item.badgeColor || 'neutral'}">${item.badge || item.type}</span>
                <span class="timeline-item__date">${formatDate(item.date)}</span>
              </div>
              <h3 class="timeline-item__title">${item.title}</h3>
              <p class="timeline-item__desc">${item.description}</p>
              ${item.link ? `<a href="${item.link}" class="timeline-item__link">View Details →</a>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }
  </script>

</body>

</html>
