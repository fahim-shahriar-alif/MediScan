<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — MediScan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages/auth.css" />
</head>

<body class="auth-body">

  <header class="auth-header">
    <a href="../index.html" class="navbar__logo" aria-label="MediScan home">
      <img src="../assets/logo.svg" alt="MediScan" class="navbar__logo-img" />
    </a>
  </header>

  <main class="auth-main">

    <!-- Step 1: Enter email -->
    <div class="auth-card card" id="stepRequest">

      <div class="auth-card__icon-wrap">
        <div class="auth-card__icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </div>
      </div>

      <div class="auth-card__head">
        <h1 class="auth-card__title">Forgot your password?</h1>
        <p class="auth-card__subtitle">
          Enter your email and we'll send you a reset link.
        </p>
      </div>

      <div id="authAlert" class="auth-alert" hidden></div>

      <form id="resetForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="resetEmail">Email address</label>
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              aria-hidden="true">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input class="form-input auth-input" type="email" id="resetEmail" placeholder="you@example.com"
              autocomplete="email" required />
          </div>
          <p class="auth-field-error" id="resetEmailErr" hidden></p>
        </div>

        <button class="btn btn-primary w-full auth-submit" type="submit" id="resetSubmit">
          Send Reset Link
        </button>
      </form>

      <p class="auth-switch">
        <a href="login.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          Back to sign in
        </a>
      </p>
    </div>

    <!-- Step 2: Sent confirmation -->
    <div class="auth-card card" id="stepSent" hidden>
      <div class="auth-card__icon-wrap">
        <div class="auth-card__icon auth-card__icon--success">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </div>
      </div>
      <div class="auth-card__head">
        <h1 class="auth-card__title">Check your email</h1>
        <p class="auth-card__subtitle">
          We sent a reset link to <strong id="sentEmail"></strong>.
          Check your inbox and follow the instructions.
        </p>
      </div>

      <!-- Demo token display (remove in production) -->
      <div class="auth-demo-token alert alert-info" id="demoTokenBox" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 16v-4" />
          <path d="M12 8h.01" />
        </svg>
        <div>
          <strong>Demo mode:</strong> No email was sent. Your reset token is:
          <code id="demoToken" style="font-weight:700;letter-spacing:0.1em"></code>
        </div>
      </div>

      <a href="login.html" class="btn btn-primary w-full auth-submit" style="margin-top:0.5rem">
        Back to Sign In
      </a>
      <p class="auth-switch" style="margin-top:1rem">
        Didn't receive it?
        <button class="auth-resend" id="resendBtn" type="button">Resend email</button>
      </p>
    </div>

  </main>

  <script src="../config.js"></script>
  <script type="module">
    import { requestPasswordReset } from '../js/auth.js';

    const form = document.getElementById('resetForm');
    const submitBtn = document.getElementById('resetSubmit');
    const alertBox = document.getElementById('authAlert');
    const step1 = document.getElementById('stepRequest');
    const step2 = document.getElementById('stepSent');

    function showAlert(msg, type = 'danger') {
      alertBox.className = `auth-alert auth-alert--${type}`;
      alertBox.textContent = msg;
      alertBox.hidden = false;
    }
    function fieldError(id, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.hidden = !msg;
    }
    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.textContent = loading ? 'Sending…' : 'Send Reset Link';
    }

    function doReset(email) {
      setLoading(true);
      setTimeout(() => {
        const result = requestPasswordReset(email);
        setLoading(false);
        if (result.ok) {
          step1.hidden = true;
          step2.hidden = false;
          document.getElementById('sentEmail').textContent = email;
          // Show demo token if no real email service
          if (result._demoToken) {
            document.getElementById('demoTokenBox').hidden = false;
            document.getElementById('demoToken').textContent = result._demoToken;
          }
        } else {
          showAlert('Something went wrong. Please try again.');
        }
      }, 600);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      alertBox.hidden = true;
      fieldError('resetEmailErr', '');
      const email = document.getElementById('resetEmail').value.trim();
      if (!email) { fieldError('resetEmailErr', 'Email is required.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        fieldError('resetEmailErr', 'Enter a valid email address.'); return;
      }
      doReset(email);
    });

    document.getElementById('resendBtn').addEventListener('click', () => {
      const email = document.getElementById('resetEmail').value.trim();
      if (email) doReset(email);
    });
  </script>

</body>

</html>
